[shell.files]
"shell/bin" = "~/.local/bin"
"shell/shell" = "~/.config/shell"
"shell/.bashrc" = "~/.bashrc"
"shell/.bash_profile" = "~/.bash_profile"
"shell/.bash_logout" = "~/.bash_logout"
"shell/.zshrc" = "~/.zshrc"
"shell/.zshenv" = "~/.zshenv"

[wsl.files]
"wsl/wsl.conf" = { target = "/etc/wsl.conf", type="symbolic" }
