[shell.files]
"shell/bin" = "~/.local/bin"
"shell/shell" = "~/.config/shell"
"shell/.bashrc" = "~/.bashrc"
"shell/.bash_profile" = "~/.bash_profile"
"shell/.bash_logout" = "~/.bash_logout"
"shell/.zshrc" = "~/.zshrc"
"shell/.zshenv" = "~/.zshenv"

[vscode.files]
"vscode/vim_settings.json" = "~/Library/Application Support/Code/User/settings.json"

[nvim.files]
nvim = { target = "~/.config/nvim", type="symbolic" }

[obsidian.files]
"vim/vimrc" = { target = "~/.obsidian.vimrc", type="symbolic" }
